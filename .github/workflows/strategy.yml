name: ML Uptrend Strategy Pipeline

on:
  workflow_dispatch:
    inputs:
      run_download:
        description: 'Run data download'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      run_train:
        description: 'Run model training'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      run_scan:
        description: 'Run full-A scan'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
  schedule:
    # Every trading day at 15:30 CST (07:30 UTC)
    - cron: '30 7 * * 1-5'

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare config
        run: cp config.example.json config.json

      - name: Cache data directory
        uses: actions/cache@v4
        with:
          path: data
          key: tdx-data-${{ github.run_id }}
          restore-keys: |
            tdx-data-

      - name: Cache models directory
        uses: actions/cache@v4
        with:
          path: models
          key: ml-models-${{ github.run_id }}
          restore-keys: |
            ml-models-

      - name: Download data
        if: ${{ github.event_name == 'schedule' || inputs.run_download == 'true' }}
        run: python run.py download

      - name: Train model
        if: ${{ github.event_name == 'schedule' || inputs.run_train == 'true' }}
        run: python run.py train

      - name: Scan full-A
        if: ${{ github.event_name == 'schedule' || inputs.run_scan == 'true' }}
        run: python run.py scan

      - name: Upload signals
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signals-${{ github.run_number }}
          path: signals/
          retention-days: 30

      - name: Upload model
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-${{ github.run_number }}
          path: models/
          retention-days: 30
