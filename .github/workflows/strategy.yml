name: ML Uptrend Strategy Pipeline

on:
  workflow_dispatch:
    inputs:
      run_train:
        description: 'Run model training'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      run_scan:
        description: 'Run full-A scan'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
  schedule:
    # Every trading day at 20:30 CST (12:30 UTC)
    - cron: '30 12 * * 1-5'

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare config
        run: cp config.example.json config.json

      - name: Cache qlib data
        uses: actions/cache@v4
        with:
          path: ~/.qlib/qlib_data/cn_data
          key: qlib-data-${{ github.run_id }}
          restore-keys: |
            qlib-data-

      - name: Cache models directory
        uses: actions/cache@v4
        with:
          path: models
          key: ml-models-${{ github.run_id }}
          restore-keys: |
            ml-models-

      - name: Download data
        if: ${{ github.event_name == 'schedule' || inputs.run_download == 'true' || github.event_name == 'workflow_dispatch' }}
        timeout-minutes: 30
        run: python run.py download

      - name: Train model
        if: ${{ github.event_name == 'schedule' || inputs.run_train == 'true' }}
        run: python run.py train

      - name: Scan full-A
        if: ${{ github.event_name == 'schedule' || inputs.run_scan == 'true' }}
        run: python run.py scan

      - name: Publish scan report
        if: always()
        run: |
          REPORT="signals/scan_full_a_report.html"
          if [ -f "$REPORT" ]; then
            echo "## 📊 ML主升浪扫描报告" >> $GITHUB_STEP_SUMMARY
            cat "$REPORT" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ 未找到扫描报告" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Convert report to PDF
        if: always()
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq wkhtmltopdf
          REPORT="signals/scan_full_a_report.html"
          if [ -f "$REPORT" ]; then
            wkhtmltopdf --encoding utf-8 --page-size A4 \
              --margin-top 10mm --margin-bottom 10mm \
              --margin-left 10mm --margin-right 10mm \
              "$REPORT" signals/scan_full_a_report.pdf
            echo "PDF报告已生成: signals/scan_full_a_report.pdf"
          else
            echo "⚠️ 未找到HTML报告，跳过PDF生成"
          fi

      - name: Upload report to Release
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PDF="signals/scan_full_a_report.pdf"
          if [ ! -f "$PDF" ]; then
            echo "⚠️ 未找到PDF报告，跳过Release上传"
            exit 0
          fi
          TAG="scan-$(date +%Y-%m-%d)"
          TITLE="全A扫描报告 $(date +%Y-%m-%d)"
          # 如果Release不存在则创建，已存在则更新
          gh release create "$TAG" "$PDF" \
            --title "$TITLE" \
            --notes "ML主升浪策略全A扫描报告 $(date +%Y-%m-%d)" \
            --repo ${{ github.repository }} 2>/dev/null || \
          gh release upload "$TAG" "$PDF" \
            --clobber \
            --repo ${{ github.repository }}
          echo "✅ PDF已上传到Release: $TAG"

      - name: Upload signals
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signals-${{ github.run_number }}
          path: signals/
          retention-days: 30

      - name: Upload model
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-${{ github.run_number }}
          path: models/
          retention-days: 30
